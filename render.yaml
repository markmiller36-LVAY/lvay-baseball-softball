services:
  - type: web
    name: lvay-baseball-softball
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    disk:
      name: lvay-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/lvay_v2.db
      - key: SEASON_YEAR
        value: "2026"
      - key: TZ
        value: America/Chicago
